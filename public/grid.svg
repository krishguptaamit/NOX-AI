<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="gridGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.6"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g stroke="url(#gridGradient)" stroke-width="1" filter="url(#glow)">

    <!-- Horizontal -->
    <line x1="0" y1="850" x2="1600" y2="850"/>
    <line x1="0" y1="800" x2="1600" y2="800"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="0" y1="700" x2="1600" y2="700"/>
    <line x1="0" y1="650" x2="1600" y2="650"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="550" x2="1600" y2="550"/>
    <line x1="0" y1="500" x2="1600" y2="500"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>

    <!-- Perspective -->
    <line x1="800" y1="450" x2="0" y2="900"/>
    <line x1="800" y1="450" x2="200" y2="900"/>
    <line x1="800" y1="450" x2="400" y2="900"/>
    <line x1="800" y1="450" x2="600" y2="900"/>
    <line x1="800" y1="450" x2="800" y2="900"/>
    <line x1="800" y1="450" x2="1000" y2="900"/>
    <line x1="800" y1="450" x2="1200" y2="900"/>
    <line x1="800" y1="450" x2="1400" y2="900"/>
    <line x1="800" y1="450" x2="1600" y2="900"/>

  </g>
</svg>